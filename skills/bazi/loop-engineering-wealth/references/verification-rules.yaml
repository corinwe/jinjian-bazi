# 财富体系·自动验证规则清单
# CHECKER引擎读取此文件，逐条验证报告内容 vs skill规则一致性
# 每条规则包含 id/desc/field/compare/logic/severity
# 2026-07-02 v2: 5种墓库全量 + 印枭修正

rules:

  - rule: "能量链条"
    checks:
      - id: "chain_three_nodes"
        desc: "报告必须有比劫→食伤→财三个环节数值"
        field: "能量链条"
        expect: "三环节完整"
        severity: "error"
      - id: "chain_start_vs_shen"
        desc: "链条起点(比劫)与身强弱评分一致"
        compare_a: "报告中的比劫分"
        compare_b: "身强弱总分"
        logic: "|比劫分 - 身强弱分| ≤ 5"
        severity: "warning"
      - id: "chain_end_vs_cai"
        desc: "链条终点(财)与财星评分一致"
        compare_a: "报告中财环节标注(旺/弱)"
        compare_b: "财星总分≥40?旺:弱"
        severity: "error"
      - id: "chain_six_states"
        desc: "链条结论必须是§1六种状态之一"
        field: "链条结论"
        expected_in: ["身强财旺","身弱财旺","身强财弱","身弱财弱","无财身弱","无财身强"]
        severity: "error"

  - rule: "发财五法"
    checks:
      - id: "five_methods_table"
        desc: "5种发财方法全部逐条判定"
        field: "发财五法表"
        expect: "5行, 每行有判定标记(✅/❌/⚠️)"
        severity: "error"
      - id: "method1_shenqiang_and_caiwang"
        desc: "身强财旺法: 必须同时满足身强40-60+财旺≥40"
        logic: "身强40-60 AND 财≥40 = ✅ 否则 ❌"
        severity: "error"
      - id: "method2_ku_location"
        desc: "遇库则发: 日/时柱有库=自己库, 年/月有库≠自己库"
        severity: "error"

  - rule: "合作伙伴"
    checks:
      - id: "partner_strength_split"
        desc: "身强/身弱合作模式分开写"
        field: "合作伙伴"
        expect: "身强和身弱两套模式都覆盖"
        severity: "error"
      - id: "partner_strong_detail"
        desc: "身强者写3种模式(财/官杀/食伤)"
        expect: "包含财→老板 官杀→领导 食伤→下属"
        severity: "warning"
      - id: "partner_weak_detail"
        desc: "身弱者写2种模式(比劫/印)"
        expect: "包含比劫→朋友 印→师长"
        severity: "warning"

  - rule: "破财5条"
    checks:
      - id: "pocai_five_table"
        desc: "5种破财条件全部逐条检查"
        field: "破财条件表"
        expect: "5行, 每行判定"
        severity: "error"
      - id: "pocai_c1_star_impact"
        desc: "条件①财星受冲: 有流年冲克财星的检查"
        severity: "warning"
      - id: "pocai_c3_strength"
        desc: "条件③身强遇比劫: 必须区分身强(破财)vs身弱(合作)"
        logic: "身强+比劫=破财❌ 身弱+比劫=可合作✅"
        severity: "error"
      - id: "pocai_c5_40_rule"
        desc: "条件⑤遇墓破财: 与§10.0 40分法则一致"
        severity: "error"

  - rule: "财富五级"
    checks:
      - id: "level_jufu_dafu_diff"
        desc: "巨富vs大富: 大运配合无刑冲=巨富, 大运刑冲=大富"
        severity: "error"
      - id: "level_ku_self_vs_ancestor"
        desc: "日/时柱有库=自己库, 年/月有库=祖上库"
        field: "库位置"
        severity: "error"

  - rule: "五种墓库(§10.1)"
    checks:
      - id: "muku_all_five"
        desc: "必须检查全部5种墓库(比劫/财才/官杀/印/食伤), 不只财才墓库"
        field: "五种墓库"
        expect: "5种全部检查"
        severity: "error"
      - id: "muku_rizhu_lookup"
        desc: "日主→查§10.1表→逐库验证八字中是否有该地支→对比报告标注"
        fields: ["财库标注","八字","日主"]
        severity: "error"
      - id: "muku_wu_dual"
        desc: "戌在每种日主至少2列, 必须全部识别"
        field: "戌属性"
        severity: "error"
      - id: "muku_tu_ku_correct"
        desc: "土的墓库=戌, 庚辛金印库=戌(土库), 壬癸水官杀库=戌(土库)"
        field: "土库规则"
        severity: "error"

  - rule: "财星评分"
    checks:
      - id: "caixing_5element"
        desc: "财星五行=日主所克五行"
        severity: "error"
      - id: "caixing_position_base"
        desc: "位置基础分: 年干8/年支4/月干12/月令40/日支12/时干12/时支12"
        severity: "error"
      - id: "caixing_s1_s8_consistent"
        desc: "§1总览表财星分 = §8.1财星评分"
        severity: "error"
