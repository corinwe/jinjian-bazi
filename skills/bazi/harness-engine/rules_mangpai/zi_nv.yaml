rule:
  name: 子女分析
  version: '1.0'
  principle: 时柱为子女宫，食伤为子女星。
  shi_zhi_meaning:
    食神: 子女才华横溢、有创造力
    伤官: 子女聪明灵动、有个性
    正官: 子女有出息、守规矩
    七杀: 子女有魄力、能成大器
    正印: 子女学业好、重传统
    偏印: 子女聪明但性格古怪
    正财: 子女经济头脑好
    偏财: 子女社交能力强
    比肩: 子女独立自主
    劫财: 子女好胜心强
  shi_gan_meaning:
    食神: 对子女开明，不喜严格管教
    伤官: 对子女期望高，常有不满
    正官: 对子女要求严格，重视纪律
    七杀: 对子女严厉，望子成龙
    正印: 给子女精神支持
    偏印: 对子女方式独特
    正财: 子女经济条件好
    偏财: 子女应酬多注意引导
    比肩: 与子女如朋友
    劫财: 与子女有竞争
  jie_zi_kan_fu: 正偏财混杂印暗合他星→母有外情。正偏印混杂财上合他星→父有外情。
