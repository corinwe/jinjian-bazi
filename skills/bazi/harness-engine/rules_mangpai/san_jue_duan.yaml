rule:
  name: 三决断
  version: '1.0'
  shen_jue:
    身强: 日主能量足，可担财官。策略：主动出击型。适合主导、开创性的工作。注意：易固执，听不进意见。
    从弱: 日主弱势宜顺势。策略：借力型。选对平台比自身努力重要。注意：易没主见被带偏。
    中和: 适应性强可攻可守。策略：好运进差运退。注意：容易随波逐流。
  cai_jue:
    grade_high: 体旺财旺，有创造和驾驭财富的能力。求财方式：自身能力创造价值。
    grade_mid: 中等财富，财多体弱，财富属机会型。
    grade_low: 财星不显，不以求财为人生主线，宜专技发展。
  guan_jue:
    high: 官杀旺且得用，高层管理。事业有成。
    mid: 官杀有根，中层管理。持续努力可晋升。
    low: 官杀不显，走专技路线。以专业能力发展。
