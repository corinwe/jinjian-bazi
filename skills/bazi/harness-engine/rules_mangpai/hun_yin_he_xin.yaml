rule:
  name: 婚姻分析v2
  version: '2.0'
  principle: 配偶宫为主，配偶星为辅。命理珍宝体系。
  gong_meaning:
    伤官: 才华过人但也挑剔苛刻。对配偶要求高，容易因小事不满。配偶多半有才但性格较弱，婚姻中自己占主导地位。
    正官: 配偶正直有责任心，对自己的事业有帮助。婚姻稳定，彼此尊重。
    七杀: 配偶性格强势有魄力，婚姻中既爱又怕。冲突多但也能互相成就。
    正印: 配偶温和体贴，包容自己。婚姻中有长辈参与或支持的倾向。
    偏印: 配偶聪明但性格古怪，婚姻中沟通不畅。需要更多包容和理解。
    正财: 配偶务实稳重，善于理财。婚姻中经济方面和谐稳定。
    偏财: 配偶大方灵活，社交能力强。但需要注意对方易有桃花。
    食神: 配偶温和善良，懂得享受生活。婚姻幸福美满，相处融洽。
    比肩: 配偶与自己性格相似，既是伴侣也是朋友。需要尊重彼此的独立性。
    劫财: 配偶好胜心强，婚姻中竞争多于合作。注意避免因钱财问题产生矛盾。
  ban_lu_tao_hua:
    principle: 女命禄入主与他神相合为桃花。内向合熟人，外向合淫贱。
    check: 日支与其他支六合为桃花标志
  guan_cai_men:
    principle: 女命财为官杀原神，财被制服为关财门，离婚应期。
    weight: 伤官重财被穿倒→必离。财受冲→轻，闹离婚。
  huan_qi_huan_fu:
    principle: 配偶星宫混杂为患。轻者晚婚可避，重者必重婚重配。
    check: 天干见多颗财星(男)或官杀(女)为混杂
