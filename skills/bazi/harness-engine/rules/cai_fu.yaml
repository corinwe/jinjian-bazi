# ======
# 规则: 财富分析（含开财库·发财年份·财富等级）
# 版本: 3.0
# ======

rule:
  name: "财富分析"
  version: "3.0"

  inputs:
    - field: "藏干十神"
      purpose: "查找财星(正财/偏财)的位置和比例"
    - field: "十神"
      purpose: "天干财星检查（年干/月干/日干/时干十神）"
    - field: "身强弱.等级"
      purpose: "判断财为喜还是忌"
    - field: "大运"
      purpose: "财富时间窗口分析"
    - field: "神煞"
      purpose: "文昌贵人定位"

  position_rules:
    - name: "年干财"
      condition: "DS['十神']['年']中带'财'"
      text: "年干透财，祖业根基好，或家庭经济条件优渥，从小不缺钱。"
    - name: "年支财"
      condition: "DS['藏干十神']['年支']中存在十神为'正财'或'偏财'的条目"
      text: "年支见财星，祖上或早年就有财运根基。"
    - name: "月财"
      condition: "DS['十神']['月']中带'财'或DS['藏干十神']['月支']中存在财星"
      text: "月柱见财星，青年时期财运开始显现。父母或社交圈带来财富机遇。"
    - name: "日财"
      condition: "DS['藏干十神']['日支']中存在财星"
      text: "日支见财星，中年财富靠自身和配偶共同努力。是财富积累的关键阶段。"
    - name: "时财"
      condition: "DS['十神']['时']中带'财'或DS['藏干十神']['时支']中存在财星"
      text: "时支见财星，晚年财运佳。财富传承或退休收入丰厚。"

  # ─── 财富等级判定（九龙体系）───
  wealth_grade:
    name: "财富等级"
    description: "综合财星数量+身强弱+大运+食伤生财，判定财富等级(1-10级)"
    levels:
      - grade: 1-2
        desc: "低等级财富。财星不显或全为忌神，求财辛苦。"
      - grade: 3-4
        desc: "中等偏下。有财但数量少或日主担不住，需大运配合。"
      - grade: 5-6
        desc: "中等财富。财星有根+身能担财+大运有助，稳定小康以上。"
      - grade: 7-8
        desc: "高等级财富。财星旺+身强+食伤生财流通+大运助力，富裕阶层。"
      - grade: 9-10
        desc: "顶级财富。财星透干通根+身强担财+财库冲开+大运一路喜用。"
    scoring:
      - name: "财星数量"
        weight: 3
        rules: "每颗财星(含天干+藏干)+1分，上限5分"
      - name: "身强弱"
        weight: 3
        rules: "身强得3分，从弱得2分，中和得2分，身弱得1分"
      - name: "大运助力"
        weight: 2
        rules: "有3步以上财运得2分，1-2步得1分，无得0分"
      - name: "食伤生财"
        weight: 2
        rules: "有食伤生财路线得2分，无为0分"

  # ─── 发财关键年份 ───
  fa_cai_year:
    name: "发财年份"
    description: "财星透干+喜用神大运中的财流年"
    rule: "财星透干或财库冲开的流年，且大运为喜用或中性运时，为发财窗口。地支辰戌丑未冲开之年也是财库释放期。"

  template_vars:
    CAI_TABLE: "财星分布表（含天干+地支）"
    CAI_ROAD: "财富路线分析"
    CAI_GRADE: "财富等级判定(1-10级)"
    FA_CAI_YEAR: "发财关键年份"
    SHEN_CAI: "身强弱对财富的影响"
    DA_YUN_CAI: "大运财富窗口"
    KAI_CAI_KU: "开财库方案"

  # ─── 身强弱对财富的影响（v3补回）───
  shen_rules:
    - name: "身强喜财"
      condition: "DS['身强弱']['等级']中包含'身强'"
      text: "身强喜财。日主能量充足，有能力追求和驾驭财富。求财主动积极，适合靠自身能力赚钱。但身强比劫重者需防合作破财。"
    - name: "从弱喜财"
      condition: "DS['身强弱']['等级']中包含'从弱'"
      text: "从弱格局，财为喜用。财富来自外部环境而非自身能力，顺势而为能获利。适合做资源整合、平台型赚钱模式。"
    - name: "身弱财为忌"
      condition: "DS['身强弱']['等级']中包含'身弱'"
      text: "身弱财为忌神。财来耗身，求财辛苦。赚钱的方式比赚钱的金额更重要，适合轻资产、高利润、低体力的赚钱模式。"
    - name: "中和财中性"
      condition: "DS['身强弱']['等级']中包含'中和'"
      text: "中和格局，财为中性。能赚钱也能守财，不会因为财富大起大落。财运随大运走，好运来财富来，差运时保守即可。"
