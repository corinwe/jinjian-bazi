# ═══════════════════════════════════════
# 规则: 财富分析（含开财库）
# Harness Engineering · 规则外化为文件
# 版本: 1.0
# ═══════════════════════════════════════

rule:
  name: "财富分析"
  version: "1.0"
  author: "金鉴真人"

  # ─── 输入字段（必须从DS取） ───
  inputs:
    - field: "藏干十神"
      purpose: "查找财星(正财/偏财)的位置和比例"
    - field: "身强弱.等级"
      purpose: "判断财为喜还是忌"
    - field: "大运"
      purpose: "财富时间窗口分析"

  # ─── 财星位置规则 ───
  position_rules:
    - name: "年支财"
      condition: "DS['藏干十神']['年支']中存在十神为'正财'或'偏财'的条目"
      text: "年支见财星，祖上或早年就有财运根基。年柱代表0-16岁，财在年支说明家庭经济条件尚可，或从小对钱有概念。"

    - name: "月支财"
      condition: "DS['藏干十神']['月支']中存在十神为'正财'或'偏财'的条目"
      text: "月支见财星，青年时期财运开始显现。月柱代表17-32岁，父母或社交圈带来财富机遇，适合在这一阶段开始理财。"

    - name: "日支财"
      condition: "DS['藏干十神']['日支']中存在十神为'正财'或'偏财'的条目"
      text: "日支见财星，中年财富靠自身和配偶共同努力。日支33-48岁，是财富积累的关键阶段。"

    - name: "时支财"
      condition: "DS['藏干十神']['时支']中存在十神为'正财'或'偏财'的条目"
      text: "时支见财星，晚年财运佳。时柱49-64岁，财富传承或退休收入丰厚。子女有经济头脑。"

  # ─── 身强弱对财富的影响 ───
  shen_rules:
    - name: "身强喜财"
      condition: "DS['身强弱']['等级']中包含'身强'"
      text: "身强喜财。日主能量充足，有能力追求和驾驭财富。求财主动积极，适合靠自身能力赚钱。但身强比劫重者需防合作破财。"

    - name: "从弱喜财"
      condition: "DS['身强弱']['等级']中包含'从弱'"
      text: "从弱格局，财为喜用。财富来自外部环境而非自身能力，顺势而为能获利。适合做资源整合、平台型赚钱模式。"

    - name: "身弱财为忌"
      condition: "DS['身强弱']['等级']中包含'身弱'"
      text: "身弱财为忌神。财来耗身，求财辛苦。赚钱的方式比赚钱的金额更重要，适合轻资产、高利润、低体力的赚钱模式。"
    - name: "中和财中性"
      condition: "DS['身强弱']['等级']中包含'中和'"
      text: "中和格局，财为中性。能赚钱也能守财，不会因为财富大起大落。财运随大运走，好运来财富来，差运时保守即可。"

  # ─── 食伤生财规则 ───
  shi_shang_rule:
    condition: "DS['十神']['月']为'食神'或'伤官'，或DS['藏干十神']['日支']中存在十神为'食神'或'伤官'的条目"
    text: "食伤生财路线清晰。靠才华、技术、创意变现。知识和服务随着年龄增值。"

  # ─── 财星状态 ───
  state_rules:
    - name: "财星透干"
      condition: "DS['八字段'][0]或DS['八字段'][2]或DS['八字段'][4]或DS['八字段'][6]的五行属财"
      text: "财星透干，财富显性。旁人看得出你的经济实力，赚钱方式公开透明。"

    - name: "财星藏支"
      condition: "财星全部在地支不透天干"
      text: "财星藏支不透，财富属于积累型而非张扬型。低调内敛的赚钱方式，适合长期价值投资。"

  # ─── 大运财富窗口 ───
  da_yun_rule:
    condition: "遍历DS['大运']，找出天干五行属木(甲乙)或水(壬癸)或火(丙丁)的大运"
    text: "大运透财干或食伤干时为财富机遇期。喜用神大运中天干为财星或食伤者，是该十年中财富增长最快的年份。"

  # ─── 开财库规则 ───
  kai_cai_ku_rule:
    condition: "DS['年支']或DS['月支']或DS['日支']或DS['时支']有'辰戌丑未'"
    text: "原局有财库（辰为水库亦为财库、戌为火库、丑为金库、未为木库）。财库在原局被冲开的大运或流年，财富有突破性增长。"
  
  # ─── 模板变量描述 ───
  template_vars:
    CAI_XING_TABLE: "根据position_rules生成的财星分布表格"
    CAI_FU_LU_XIAN: "根据shi_shang_rule和state_rules生成的财富路线分析"
    SHEN_CAI_FEN_XI: "根据shen_rules生成的身强弱vs财富分析"
    DA_YUN_CAI_CHUANG: "根据da_yun_rule生成的大运财富窗口分析"
    KAI_CAI_KU: "根据kai_cai_ku_rule生成的开财库方案"
    XING_CAI_JIAN_YI: "综合所有规则的赚钱建议"
