# ======
# 规则: 事业分析（含升官年份·事业等级）
# 版本: 3.0
# ======

rule:
  name: "事业分析"
  version: "3.0"

  inputs:
    - field: "十神"
      purpose: "月干十神作为外在人格和事业倾向"
    - field: "藏干十神"
      purpose: "日支十神作为内在驱动力"
    - field: "身强弱.等级"
      purpose: "判断事业方向"
    - field: "大运"
      purpose: "事业窗口期"

  month_stem_rules:
    - condition: "DS['十神']['月']为'食神'或'伤官'"
      text: "靠才华和技术立身。适合创作、咨询、技术、教育类行业。以专业知识为核心竞争力。"
    - condition: "DS['十神']['月']为'正官'或'七杀'"
      text: "事业心强。适合管理岗位、体制内、有明确晋升通道的工作。规则感和纪律性是优势。"
    - condition: "DS['十神']['月']为'正印'或'偏印'"
      text: "喜学习、重积累。适合研究型、学术型、工程型岗位。稳定的大平台比冒险创业更适合。"
    - condition: "DS['十神']['月']为'正财'或'偏财'"
      text: "务实重利，经济意识强。适合商务、贸易、金融、运营类岗位。"
    - condition: "DS['十神']['月']为'比肩'或'劫财'"
      text: "竞争意识强。适合销售、市场、管理等需要人际交锋的领域。"

  shen_rules:
    - name: "身强事业"
      condition: "DS['身强弱']['等级']中包含'身强'"
      text: "身强者有主见、抗压能力强。适合主导型、管理型、创业型的工作模式。"
      advice: "适合行业：管理、创业、销售、市场、金融、法律。忌过度安逸和稳定型岗位。"
    - name: "从弱事业"
      condition: "DS['身强弱']['等级']中包含'从弱'"
      text: "从弱格局，事业靠顺势而为。适合平台型、资源型的职业路径。跟对人比自身能力更重要。"
      advice: "适合行业：平台型、资源整合型、大型机构、团队协作。忌独立创业。"
    - name: "身弱事业"
      condition: "DS['身强弱']['等级']中包含'身弱'"
      text: "身弱者能量不足，适合合作型而非主导型的工作模式。需借助贵人提携。"
      advice: "适合行业：稳定型岗位、技术岗、研究岗、教育岗。忌高压销售和独立管理。"
    - name: "中和事业"
      condition: "DS['身强弱']['等级']中包含'中和'"
      text: "中和格局适应性强。行业选择面宽，关键在大运的选择和把握。"
      advice: "适合行业：没有限制，根据大运喜忌调整方向。好运时进攻，差运时防守。"

  # ─── 事业等级判定（九龙体系）───
  career_grade:
    name: "事业等级"
    description: "综合官杀强度+身强弱+大运，判定事业等级(1-10级)"
    levels:
      - grade: 1-2
        desc: "事业运弱。官杀不显或全为忌神，职场发展空间有限。"
      - grade: 3-4
        desc: "基层到中层。有官杀但身弱或大运不助，管理机会有限。"
      - grade: 5-6
        desc: "中层管理。官杀得用+身能担+大运有助，可做到部门负责人。"
      - grade: 7-8
        desc: "高层管理。官杀旺+身强+大运一路助力，可做到高管或创始人。"
      - grade: 9-10
        desc: "顶级事业。官杀透干通根+身强+大运一路喜用，行业领袖级。"
    scoring:
      - name: "官杀得分"
        weight: 3
        rules: "月柱有官杀得2分，日支有官杀得1分，天干透官杀再加1分"
      - name: "身强弱"
        weight: 3
        rules: "身强得3分，从弱得2分，中和得2分，身弱得1分"
      - name: "大运助力"
        weight: 2
        rules: "有2步以上官杀大运得2分，1步得1分，无得0分"
      - name: "财印辅助"
        weight: 2
        rules: "有财生官或印护官得2分，只其一得1分"

  # ─── 升官关键年份 ───
  sheng_guan_year:
    name: "升官年份"
    description: "官杀透干+喜用神大运中的官流年"
    rule: "官杀透干的流年，配合喜用神大运，是事业晋升窗口。正官流年加官进爵，七杀流年挑战与机遇并存。"

  template_vars:
    SHI_HE_HANG_YE: "适合行业判断"
    SHI_YE_LU_XIAN: "事业路线分析"
    SHI_YE_GRADE: "事业等级判定(1-10级)"
    SHENG_GUAN_YEAR: "升官关键年份"
    TI_YONG_SHIYE: "体用事业分析"
    DA_YUN_SHIYE: "大运事业窗口"
