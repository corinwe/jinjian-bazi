# ═══════════════════════════════════════
# 规则: 事业分析
# 版本: 1.0
# ═══════════════════════════════════════

rule:
  name: "事业分析"
  version: "1.0"
  author: "金鉴真人"

  inputs:
    - field: "十神"
      purpose: "分析月干十神作为外在人格和事业倾向"
    - field: "藏干十神"
      purpose: "分析日支十神作为内在驱动力"
    - field: "身强弱.等级"
      purpose: "判断事业方向"

  # ─── 月干十神→事业倾向 ───
  month_stem_rules:
    - condition: "DS['十神']['月']为'食神'或'伤官'"
      text: "月干为食神或伤官者，靠才华和技术立身。适合创作、咨询、技术、教育类行业。以专业知识为核心竞争力，不适合过度销售类岗位。"

    - condition: "DS['十神']['月']为'正官'或'七杀'"
      text: "月干为正官或七杀者，事业心强。适合管理岗位、体制内、有明确晋升通道的工作。规则感和纪律性是优势。"

    - condition: "DS['十神']['月']为'正印'或'偏印'"
      text: "月干为印星者，喜学习、重积累。适合研究型、学术型、工程型岗位。稳定的大平台比冒险创业更适合。"

    - condition: "DS['十神']['月']为'正财'或'偏财'"
      text: "月干为财星者，务实重利，经济意识强。适合商务、贸易、金融、运营类岗位。追求高回报和实际收益。"

    - condition: "DS['十神']['月']为'比肩'或'劫财'"
      text: "月干为比劫者，竞争意识强。适合销售、市场、管理等需要人际交锋的领域。独立性强但也需注意团队合作。"

  # ─── 身强弱→事业建议 ───
  shen_rules:
    - name: "身强事业"
      condition: "DS['身强弱']['等级']中包含'身强'"
      text: "身强者有主见、抗压能力强。适合主导型、管理型、创业型的工作模式。能承受高压环境，适合在竞争激烈的行业中打拼。"
      advice: "适合行业：管理、创业、销售、市场、金融、法律。忌过度安逸和稳定型岗位。"

    - name: "从弱事业"
      condition: "DS['身强弱']['等级']中包含'从弱'"
      text: "从弱格局，事业靠顺势而为。不适合单打独斗，适合平台型、资源型的职业路径。跟对人、选对平台比自身能力更重要。"
      advice: "适合行业：平台型、资源整合型、大型机构、团队协作。忌独立创业。"

    - name: "身弱事业"
      condition: "DS['身强弱']['等级']中包含'身弱'"
      text: "身弱者能量不足，适合合作型而非主导型的工作模式。大平台的安稳岗位比高风险创业更适合。需借助贵人提携。"
      advice: "适合行业：稳定型岗位、技术岗、研究岗、教育岗。忌高压销售和独立管理。"
    - name: "中和事业"
      condition: "DS['身强弱']['等级']中包含'中和'"
      text: "中和格局适应性强。行业选择面宽，只要运到就能做出一番成绩。关键在大运的选择和把握。"
      advice: "适合行业：没有限制，根据大运喜忌调整方向。好运时进攻，差运时防守。"

  # ─── 日支十神→内在驱动力 ───
  day_branch_rules:
    - condition: "DS['藏干十神']['日支'][0]['十神']为'食神'或'伤官'"
      text: "日支为食伤者，职业生涯靠才华驱动。内在驱动力是创造和表达。"

    - condition: "DS['藏干十神']['日支'][0]['十神']为'正官'或'七杀'"
      text: "日支为官杀者，职业生涯靠目标驱动。内在驱动力是成就和被认可。"

    - condition: "DS['藏干十神']['日支'][0]['十神']为'正印'或'偏印'"
      text: "日支为印星者，职业生涯靠学习驱动。内在驱动力是成长和积累。"

  # ─── 大运事业窗口 ───
  da_yun_rule:
    condition: "遍历DS['大运']，天干五行属火(丙丁→官杀)或属木(甲乙→财)的大运"
    text: "官杀透干的大运是事业突破窗口期。财星透干的大运是财富和事业同步上升期。"

  template_vars:
    SHI_HE_HANG_YE: "根据month_stem_rules和shen_rules生成的适合行业判断"
    SHI_YE_LU_XIAN: "根据day_branch_rules和shen_rules生成的事业路线分析"
    DA_YUN_SHI_YE: "根据da_yun_rule生成的大运事业窗口"
    SHI_YE_JIAN_YI: "综合所有规则的事业建议"
