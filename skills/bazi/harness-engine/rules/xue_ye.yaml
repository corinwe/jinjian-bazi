# ======
# 规则: 学业分析（含补文昌·学历等级）
# 版本: 3.0
# 九龙道长核心规则:
#   ① 身强不喜印 → 18岁前走印运学业不好
#   ② 身弱喜印 → 18岁前走印运学业好
#   ③ 文昌+大运+印三维联动
#   ④ 原局无文昌→大运遇文昌/印出运→学历高
# ======

rule:
  name: "学业分析"
  version: "3.0"

  inputs:
    - field: "神煞.文昌贵人"
      purpose: "文昌贵人所在位置"
    - field: "十神"
      purpose: "印星强弱=学习力"
    - field: "藏干十神"
      purpose: "地支印星"
    - field: "身强弱.等级"
      purpose: "身强不喜印，身弱喜印"
    - field: "大运"
      purpose: "18岁前大运判定"

  # ─── 印星判定 ───
  yin_rules:
    - name: "身强VS印"
      condition: "身强"
      text: "身强不喜印。身强之人自身能量已经足够，再逢印星反而会产生依赖、惰性，18岁前走印运可能学业反而不利。学业的好坏取决于食伤(才华)的发挥而非印星(记忆)。"
    - name: "身弱VS印"
      condition: "身弱或从弱"
      text: "身弱喜印。身弱之人能量不足，印星为生扶之神。18岁前走印运能补足能量，学业顺畅。印为喜用时学习力强、记忆力好、考试运佳。"
    - name: "中和VS印"
      condition: "中和"
      text: "中和格局，印为中性。学业的好坏主要看大运走向，印运和食伤运交替时调整学习策略。"

  # ─── 文昌判定 ───
  wen_rules:
    - name: "原局有文昌"
      condition: "文昌在四柱地支"
      text: "原局文昌在四柱，先天学习运好。文昌在年月柱则早慧早成，在日时柱则大器晚成。"
    - name: "原局无文昌"
      condition: "文昌不在四柱地支"
      text: "原局无文昌，需大运流年引出。如果18岁前走文昌大运或印星大运且不被克制，学历可大幅提升。"

  # ─── 学历等级 ───
  education_grade:
    name: "学历等级"
    description: "综合印星+文昌+大运+身强弱判定学历等级"
    levels:
      - grade: 1-2
        desc: "学历偏低。印星为忌+无文昌+大运不助，学业困难。"
      - grade: 3-4
        desc: "基础教育。印星不显或为忌，但有文昌辅助，基础学业可以完成。"
      - grade: 5-6
        desc: "中等学历。印星得用或文昌在四柱，大专本科水平。"
      - grade: 7-8
        desc: "高等学历。印星为喜用+文昌助力+大运18岁前配合，研究生水平。"
      - grade: 9-10
        desc: "顶级学历。印旺身强喜印+文昌得力+大运一路印星，博士/名校水平。"
    scoring:
      - name: "印星得分"
        weight: 3
        rules: "月柱有印得2分，日时有印得1分，透干加1分"
      - name: "身强弱"
        weight: 2
        rules: "身弱喜印得3分，中和得2分，身强不喜印得1分"
      - name: "文昌"
        weight: 3
        rules: "文昌在四柱得3分，大运引出得2分，无文昌得0分"
      - name: "18岁前大运"
        weight: 2
        rules: "18岁前走印运或文昌运得2分，平运得1分，忌运得0分"

  template_vars:
    YIN_ANALYSIS: "印星与身强弱分析"
    WENCHANG_POS: "文昌位置分析"
    EDUCATION_GRADE: "学历等级判定(1-10级)"
    WENCHANG_BU: "补文昌方案"
