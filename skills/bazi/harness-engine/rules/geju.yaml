rule:
  name: geju
  version: '1.0'
  inputs:
  - field: DS
    purpose: 全部数据源
  analysis_rules:
  - name: 杂气格
    condition: 月令三藏干全不透天干
    text: 杂气格。月支藏三干但全部不透，格局不稳。命途多变，选择大于努力。大运引出哪个字人生就朝哪个方向走。
  - name: 透干格
    condition: 月令藏干至少一个透天干
    text: 月令藏干透天干，格局有定体。人生主线清晰，大事有定数，奋斗有方向。
  template_vars:
    GEJU: 格局分析
