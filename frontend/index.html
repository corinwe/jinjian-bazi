<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>金鉴真人·八字命理</title>
<style>
:root{--p:#1a1a2e;--s:#16213e;--a:#e94560;--g:#d4a853;--b:#0f0f1a;--c:#1e1e32;--t:#e0e0e0;--m:#888;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--b);color:var(--t);min-height:100vh}
#app{max-width:760px;margin:0 auto;padding:0 16px 60px}
.hd{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.lg{font-size:20px;font-weight:700;color:var(--g);letter-spacing:2px}
.lg span{font-size:12px;color:var(--m);font-weight:400;margin-left:6px}
.page{display:none}.page.active{display:block}
.form-box{background:var(--c);border-radius:12px;padding:24px;margin-top:16px}
.form-box h2{font-size:18px;color:var(--g);margin-bottom:16px;text-align:center}
.fg{margin-bottom:14px}.fg label{display:block;font-size:12px;color:var(--m);margin-bottom:4px}
input[type="date"]{color-scheme:dark;padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:var(--b);color:#fff;font-size:14px;width:100%;outline:0}
.fg input,.fg select{padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:var(--b);color:#fff;font-size:14px;width:100%;outline:0}
.fg-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.opt-group{display:flex;gap:8px;margin-top:4px}
.opt-group label{display:flex;align-items:center;gap:4px;background:var(--b);padding:8px 12px;border-radius:8px;cursor:pointer;flex:1;text-align:center;justify-content:center;border:2px solid transparent;font-size:13px;color:var(--m)}
.opt-group label.active{border-color:var(--g);color:var(--g)}
.opt-group input{display:none}
.btn-p{padding:12px 28px;border-radius:25px;font-size:15px;font-weight:600;border:none;cursor:pointer;background:var(--a);color:#fff;display:inline-block;width:100%}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.loading{display:none;text-align:center;padding:30px 0}
.loading .sp{display:inline-block;width:36px;height:36px;border:3px solid var(--c);border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── 报告样式 ── */
.report-wrap{animation:fadeIn .4s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.report-header{background:linear-gradient(135deg,#1e1e32,#27254a);border-radius:12px;padding:24px;margin-top:16px;text-align:center;border-bottom:3px solid var(--g)}
.report-header h1{font-size:20px;color:var(--g);margin-bottom:4px}
.report-header .bazi{font-size:28px;color:#fff;letter-spacing:6px;margin:8px 0}
.report-header .meta{font-size:13px;color:var(--m)}
.r-section{background:var(--c);border-radius:12px;padding:20px;margin-top:12px}
.r-section h2{font-size:16px;color:var(--g);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.06)}
.r-section p{font-size:14px;line-height:1.8;color:var(--t);margin-bottom:6px}
.r-section .highlight{color:var(--g)}
.r-section .tag-good{color:#4caf50;font-weight:600}
.r-section .tag-warn{color:#ff9800}
.r-section .tag-bad{color:var(--a)}
.r-footer{text-align:center;padding:20px;font-size:12px;color:var(--m);line-height:1.6}
.bad{color:var(--a)}.good{color:#4caf50}
.sample-bar{display:flex;gap:8px;justify-content:center;margin-top:12px;font-size:12px}
.sample-bar span{cursor:pointer;color:var(--m);padding:4px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.1)}
.sample-bar span:hover{border-color:var(--g);color:var(--g)}
</style>
</head>
<body>
<div id="app">

<div class="hd"><div class="lg">金鉴真人 <span>八字命理</span></div></div>

<!-- 输入页 -->
<div id="page-input" class="page active">
<div class="form-box">
  <h2>输入出生信息 · 获取完整命理报告</h2>
  <div class="fg">
    <label>姓名</label>
    <input id="name" value="测试" placeholder="请输入姓名">
  </div>
  <div class="fg">
    <label>出生日期</label>
    <input type="date" id="birth-date" value="1980-05-15" style="color-scheme:dark">
  </div>
  <div class="fg-row">
    <div class="fg">
      <label>性别</label>
      <div class="opt-group" id="gender-group">
        <label class="active"><input type="radio" name="gender" value="男" checked> 男</label>
        <label><input type="radio" name="gender" value="女"> 女</label>
      </div>
    </div>
    <div class="fg">
      <label>出生时辰</label>
      <select id="hour">
        <option value="0">子时 23-01</option>
        <option value="2">丑时 01-03</option>
        <option value="4">寅时 03-05</option>
        <option value="6">卯时 05-07</option>
        <option value="8">辰时 07-09</option>
        <option value="10" selected>巳时 09-11</option>
        <option value="12">午时 11-13</option>
        <option value="14">未时 13-15</option>
        <option value="16">申时 15-17</option>
        <option value="18">酉时 17-19</option>
        <option value="20">戌时 19-21</option>
        <option value="22">亥时 21-23</option>
      </select>
    </div>
  </div>
  <button class="btn-p" onclick="doReport()" id="btn-submit">开始分析</button>
  <div class="loading" id="loading"><div class="sp"></div><div style="margin-top:8px;font-size:13px;color:var(--m)">排盘生成报告中...</div></div>
</div>
<div class="sample-bar">
  <span onclick="fillSample('家主','1979-07-15',4,'男')">📌 家主(庚申)</span>
  <span onclick="fillSample('子源','2011-04-25',10,'男')">📌 子源(辛卯)</span>
</div>
</div>

<!-- 报告页 -->
<div id="page-report" class="page">
<div style="display:flex;gap:8px;margin-top:12px">
  <button class="btn-p" style="padding:8px;font-size:13px;width:auto" onclick="backToInput()">← 重新输入</button>
  <button class="btn-p" style="padding:8px;font-size:13px;width:auto;background:0 0;border:1px solid var(--m);color:var(--m)" onclick="toggleJson()">📋 查看数据</button>
</div>
<div id="report-content"></div>
<div id="json-content" style="display:none;background:#111;border-radius:12px;padding:16px;margin-top:12px;font-family:monospace;font-size:11px;color:#aaa;white-space:pre-wrap;max-height:500px;overflow:auto"></div>
</div>

</div>

<script>
const API = '/api/v1';
const $ = id => document.getElementById(id);

// 选项组切换
document.querySelectorAll('.opt-group').forEach(g => {
  g.querySelectorAll('label').forEach(l => {
    l.onclick = () => {
      g.querySelectorAll('label').forEach(x => x.classList.remove('active'));
      l.classList.add('active');
      l.querySelector('input').checked = true;
    };
  });
});

function fillSample(name, date, hour, gender) {
  $('name').value = name;
  $('birth-date').value = date;
  $('hour').value = hour;
  document.querySelectorAll('input[name="gender"]').forEach(r => {
    r.checked = r.value === gender;
  });
  document.querySelectorAll('#gender-group label').forEach(l => {
    l.classList.toggle('active', l.querySelector('input').value === gender);
  });
}

function showPage(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  $('page-' + p).classList.add('active');
  window.scrollTo(0, 0);
}
function backToInput() { showPage('input'); }

// ── 生成报告 ──
async function doReport() {
  const name = $('name').value.trim() || '用户';
  const dateVal = $('birth-date').value;
  if (!dateVal) return alert('请选择出生日期');
  const [year, month, day] = dateVal.split('-').map(Number);
  const hour = parseInt($('hour').value) || 0;
  const gender = document.querySelector('input[name="gender"]:checked').value;

  $('btn-submit').disabled = true;
  $('btn-submit').textContent = '分析中...';
  $('loading').style.display = 'block';

  try {
    const res = await fetch(API + '/report', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name, gender, birth_year: year, birth_month: month, birth_day: day, birth_hour: hour})
    });
    const d = await res.json();

    $('loading').style.display = 'none';
    $('btn-submit').disabled = false;
    $('btn-submit').textContent = '开始分析';

    if (!d.success) {
      alert('分析失败: ' + (d.error || '未知错误'));
      return;
    }

    // 渲染报告
    renderReport(d.report, d.bazi, name);
    // 保存JSON调试
    $('json-content').textContent = d.report;
    showPage('report');
  } catch(e) {
    $('loading').style.display = 'none';
    $('btn-submit').disabled = false;
    $('btn-submit').textContent = '开始分析';
    alert('错误: ' + e.message);
  }
}

let jsonVisible = false;
function toggleJson() {
  jsonVisible = !jsonVisible;
  $('json-content').style.display = jsonVisible ? 'block' : 'none';
}

// ── 渲染Markdown格式报告为HTML ──
function renderReport(md, bazi, name) {
  // 简单markdown转HTML
  const lines = md.split('\n');
  let html = '<div class="report-wrap">';

  // 解析标题和段落
  let inSection = false;
  let sectionHtml = '';

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trim();

    // 跳过空分隔行
    if (trimmed === '---') continue;

    // 一级标题（报告名称）
    if (trimmed.startsWith('# ') && !trimmed.startsWith('## ')) {
      // 报告头
      const title = trimmed.replace('# ', '');
      const genderText = title.includes('八字命理报告') ? '报告' : title;
      html += `<div class="report-header"><h1>📜 ${genderText}</h1><div class="bazi">${bazi || ''}</div><div class="meta">金鉴真人·八字命理分析</div></div>`;
      continue;
    }

    // 二级标题（各章节）
    if (trimmed.startsWith('## ')) {
      // 关闭上一个section
      if (inSection && sectionHtml) {
        html += `<div class="r-section">${sectionHtml}</div>`;
        sectionHtml = '';
      }
      inSection = true;
      const secTitle = trimmed.replace('## ', '');
      sectionHtml = `<h2>${secTitle}</h2>`;
      continue;
    }

    // 普通段落
    if (trimmed) {
      if (sectionHtml) {
        // 检查是否有评分标签
        let pClass = '';
        if (trimmed.includes('🏆') || trimmed.includes('上佳')) pClass = ' class="tag-good"';
        else if (trimmed.includes('❌') || trimmed.includes('低谷') || trimmed.includes('注意')) pClass = ' class="tag-warn"';
        sectionHtml += `<p${pClass}>${trimmed}</p>`;
      } else {
        html += `<p style="font-size:14px;line-height:1.8;margin-bottom:6px">${trimmed}</p>`;
      }
    }
  }

  // 关闭最后一个section
  if (inSection && sectionHtml) {
    html += `<div class="r-section">${sectionHtml}</div>`;
  }

  // 页脚
  html += `<div class="r-footer">金鉴真人 · 八字命理分析<br>确定性规则引擎 v5.0<br>本报告基于规则计算生成，仅供参考</div>`;
  html += '</div>';

  $('report-content').innerHTML = html;
}
</script>
</body>
</html>
