<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>金鉴真人·八字命理分析</title>
<style>
:root{--g:#c9a84c;--d:#1a1a2e;--c:#252542;--t:#e8e0d0;--m:#8a8070;--b:#0d0d1a;--a:#c0392b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--b);color:var(--t);min-height:100vh}
#app{max-width:820px;margin:0 auto;padding:0 12px 40px}
input,select{font-family:inherit}

/* ── 头部 ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;background:var(--b);z-index:100}
.logo{font-size:18px;font-weight:700;color:var(--g);letter-spacing:2px}
.logo span{font-size:11px;color:var(--m);font-weight:400;margin-left:6px}
.page{display:none}.page.active{display:block}

/* ── 输入区 ── */
.input-card{background:var(--c);border-radius:12px;padding:24px 20px;margin-top:16px}
.input-card h2{font-size:17px;color:var(--g);text-align:center;margin-bottom:18px;letter-spacing:1px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.fld label{display:block;font-size:11px;color:var(--m);margin-bottom:3px}
.fld input,.fld select{width:100%;padding:9px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.08);background:var(--b);color:#fff;font-size:13px;outline:0}
.fld input:focus,.fld select:focus{border-color:var(--g)}
.fld input[type=date]{color-scheme:dark}
.opt-group{display:flex;gap:6px}
.opt-group label{flex:1;text-align:center;padding:7px;border-radius:7px;border:2px solid rgba(255,255,255,.08);cursor:pointer;font-size:13px;color:var(--m);background:var(--b)}
.opt-group label.active{border-color:var(--g);color:var(--g)}
.opt-group input{display:none}
.btn-gold{width:100%;padding:12px;border-radius:25px;font-size:15px;font-weight:600;border:none;cursor:pointer;background:var(--g);color:var(--d);letter-spacing:2px;margin-top:6px}
.btn-gold:disabled{opacity:.5;cursor:not-allowed}
.loading{display:none;text-align:center;padding:20px 0}
.loading .sp{display:inline-block;width:32px;height:32px;border:3px solid var(--c);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading span{display:block;margin-top:8px;font-size:13px;color:var(--m)}
.samples{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.samples span{padding:4px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.1);font-size:12px;color:var(--m);cursor:pointer}
.samples span:hover{border-color:var(--g);color:var(--g)}

/* ── 报告区 ── */
.toolbar{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.toolbar button{padding:7px 16px;border-radius:18px;font-size:12px;border:1px solid rgba(255,255,255,.1);background:0 0;color:var(--m);cursor:pointer}
.toolbar button:hover{border-color:var(--g);color:var(--g)}
.toolbar .primary{background:var(--g);color:var(--d);border-color:var(--g);font-weight:600}
.toolbar .primary:hover{opacity:.9}
#report{animation:fadeIn .4s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── 卡片通用 ── */
.card{background:var(--c);border-radius:10px;padding:18px;margin-top:10px}
.card-title{font-size:14px;color:var(--g);font-weight:600;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:6px}

/* ── 头部信息卡 ── */
.profile-header{background:linear-gradient(135deg,#1e1e3a,#2a2a4a);border-radius:10px;padding:20px;margin-top:10px;text-align:center}
.profile-header .big-bazi{font-size:28px;color:var(--g);letter-spacing:6px;margin:6px 0}
.profile-header .name{font-size:18px;font-weight:600}
.profile-header .info{font-size:12px;color:var(--m);margin-top:4px}
.profile-header .info span{margin:0 6px}

/* ── 四柱表 ── */
.pillar-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px}
.pillar-table th{color:var(--g);font-weight:600;font-size:11px;padding:6px 4px;border-bottom:1px solid rgba(255,255,255,.06);text-align:center}
.pillar-table td{padding:5px 4px;text-align:center;border-bottom:1px solid rgba(255,255,255,.03)}
.pillar-table tr:last-child td{border-bottom:none}
.pillar-table .label-cell{color:var(--m);font-size:11px;text-align:left;padding-left:6px;width:52px}

/* ── 核心指标 ── */
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
.metric{background:rgba(0,0,0,.15);border-radius:8px;padding:10px;text-align:center}
.metric .val{font-size:18px;font-weight:700;margin-top:2px}
.metric .lbl{font-size:11px;color:var(--m)}

/* ── 报告正文 ── */
.report-body{line-height:1.9;font-size:14px}
.report-body h3{font-size:15px;color:var(--g);margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,.04)}
.report-body p{margin-bottom:6px}
.report-body .highlight{color:var(--g)}

/* ── 大运条 ── */
.dy-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.dy-item{background:rgba(0,0,0,.15);border-radius:6px;padding:8px;text-align:center;font-size:12px}
.dy-item .dy-name{font-size:15px;font-weight:600;margin-bottom:2px}
.dy-item .dy-age{color:var(--m);font-size:10px}
.dy-item.gold{border:1px solid var(--g)}
.dy-item.green{background:rgba(76,175,80,.12)}
.dy-item.yellow{background:rgba(255,152,0,.1)}
.dy-item.red{background:rgba(192,57,43,.1)}

/* ── 维度评分 ── */
.dim-list{margin-top:6px}
.dim-row{display:flex;align-items:center;margin-bottom:7px}
.dim-row .dn{width:80px;font-size:12px;color:var(--m);flex-shrink:0}
.dim-row .db{flex:1;height:7px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin:0 8px}
.dim-row .df{height:100%;border-radius:4px}
.dim-row .ds{font-size:12px;color:var(--g);width:30px;text-align:right}

/* ── 三决断 ── */
.verdicts{margin-top:8px}
.verdict-item{background:rgba(0,0,0,.12);border-radius:6px;padding:10px;margin-bottom:6px}
.verdict-item .vt{font-size:13px;color:var(--g);font-weight:600;margin-bottom:2px}
.verdict-item .ve{font-size:13px;color:var(--t)}

/* ── 五行开运 ── */
.wx-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
.wx-item{background:rgba(0,0,0,.12);border-radius:6px;padding:8px 10px;font-size:13px}
.wx-item .wl{font-size:11px;color:var(--m)}

/* ── PDF打印 ── */
@media print{
  @page{margin:.8cm 1cm}
  body{background:#fff!important;color:#222!important;font-size:11px!important}
  .header,.toolbar,.samples,.input-card,.btn-gold,.loading{display:none!important}
  .page.active{display:block!important}
  .card{background:#fff!important;border:1px solid #ddd!important;padding:10px!important;break-inside:avoid}
  .profile-header{background:#f8f6f0!important;border:1px solid var(--g)!important}
  .profile-header .big-bazi{color:#222!important}
  .card-title{color:#222!important}
  .metric{background:#f5f5f5!important}
  .metric .val{color:#222!important}
  .pillar-table td,.pillar-table th{border-color:#ddd!important}
  .dy-item{background:#f5f5f5!important}
  .dy-item.gold{border-color:var(--g)!important}
  .report-body p{color:#333!important}
  .report-body h3{color:#222!important}
  .dim-row .db{background:#e0e0e0!important}
  .wx-item{background:#f5f5f5!important}
  .verdict-item{background:#f5f5f5!important}
  #app{max-width:100%;padding:0}
}
</style>
</head>
<body>

<div id="app">

<div class="header"><div class="logo">金鉴真人<span>八字命理</span></div></div>

<!-- ═══ 输入页 ═══ -->
<div id="page-input" class="page active">
<div class="input-card">
  <h2>输入出生信息</h2>
  <div class="row">
    <div class="fld"><label>姓名</label><input id="name" value="测试" placeholder="请输入姓名"></div>
    <div class="fld"><label>出生日期</label><input type="date" id="birth-date" value="1979-07-15" style="color-scheme:dark"></div>
  </div>
  <div class="row-3">
    <div class="fld">
      <label>性别</label>
      <div class="opt-group" id="gender-group">
        <label class="active"><input type="radio" name="gender" value="男" checked>男</label>
        <label><input type="radio" name="gender" value="女">女</label>
      </div>
    </div>
    <div class="fld">
      <label>日历类型</label>
      <div class="opt-group" id="calendar-group">
        <label class="active"><input type="radio" name="calendar" value="solar" checked>阳历</label>
        <label><input type="radio" name="calendar" value="lunar">农历</label>
      </div>
    </div>
    <div class="fld">
      <label>出生时辰</label>
      <select id="hour">
        <option value="0">子23-01</option><option value="2">丑01-03</option>
        <option value="4" selected>寅03-05</option><option value="6">卯05-07</option>
        <option value="8">辰07-09</option><option value="10">巳09-11</option>
        <option value="12">午11-13</option><option value="14">未13-15</option>
        <option value="16">申15-17</option><option value="18">酉17-19</option>
        <option value="20">戌19-21</option><option value="22">亥21-23</option>
      </select>
    </div>
  </div>
  <button class="btn-gold" onclick="doAnalyze()" id="btn-submit">开始分析</button>
  <div class="loading" id="loading"><div class="sp"></div><span>排盘生成报告中...</span></div>
</div>
<div class="samples">
  <span onclick="fillSample('家主','1979-07-15',4,'男')">📌 家主</span>
  <span onclick="fillSample('子源','2011-04-25',10,'男')">📌 子源</span>
  <span onclick="fillSample('立','2011-04-25',12,'男')">📌 立</span>
  <span onclick="fillSample('测试','1990-03-08',6,'女')">📌 随机</span>
</div>
</div>

<!-- ═══ 报告页 ═══ -->
<div id="page-report" class="page">
<div class="toolbar">
  <button class="primary" onclick="window.print()">📄 下载PDF</button>
  <button onclick="backInput()">← 重新输入</button>
  <button onclick="toggleDebug()">🔍 原始数据</button>
</div>
<div id="report"></div>
<div id="debug" style="display:none;background:#0a0a12;border-radius:8px;padding:14px;margin-top:10px;font-family:monospace;font-size:10px;color:#666;white-space:pre-wrap;max-height:400px;overflow:auto"></div>
</div>

</div>

<script>
const API='/api/v1';const $=id=>document.getElementById(id);

/* ── 选项切换 ── */
document.querySelectorAll('.opt-group').forEach(g=>{
  g.querySelectorAll('label').forEach(l=>{
    l.onclick=()=>{
      g.querySelectorAll('label').forEach(x=>x.classList.remove('active'));
      l.classList.add('active');l.querySelector('input').checked=true;
    };
  });
});

function fillSample(n,d,h,g){
  $('name').value=n;$('birth-date').value=d;$('hour').value=h;
  document.querySelectorAll('input[name="gender"]').forEach(r=>r.checked=r.value===g);
  document.querySelectorAll('#gender-group label').forEach(l=>l.classList.toggle('active',l.querySelector('input').value===g));
}

/* ── 分析 ── */
async function doAnalyze(){
  const name=$('name').value.trim()||'用户',dv=$('birth-date').value;
  if(!dv)return alert('请选择出生日期');
  const [y,m,d]=dv.split('-').map(Number),h=parseInt($('hour').value)||0;
  const g=document.querySelector('input[name="gender"]:checked').value;
  const cal=document.querySelector('input[name="calendar"]:checked').value;
  $('btn-submit').disabled=true;$('btn-submit').textContent='分析中...';$('loading').style.display='block';
  try{
    const r1=await fetch(API+'/engine/debug',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,gender:g,birth_year:y,birth_month:m,birth_day:d,birth_hour:h,calendar_type:cal})});
    const data=await r1.json();
    $('loading').style.display='none';$('btn-submit').disabled=false;$('btn-submit').textContent='开始分析';
    $('debug').textContent=JSON.stringify(data,null,2);
    renderReport(data,name,g,y,m,d,h);
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    $('page-report').classList.add('active');window.scrollTo(0,0);
  }catch(e){
    $('loading').style.display='none';$('btn-submit').disabled=false;$('btn-submit').textContent='开始分析';
    alert('错误: '+e.message);
  }
}
function backInput(){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));$('page-input').classList.add('active');}
let dv=false;function toggleDebug(){dv=!dv;$('debug').style.display=dv?'block':'none';}

/* ── 渲染报告 ── */
function renderReport(data,name,gender,year,month,day,hour){
  const pp=data.paipan||{},bd=data.basic_data||{},r=data.result||{};
  const s1=r.sec_1_overview||{},s3=r.sec_3_shen_qiang_ruo||{},s4=r.sec_4_xi_yong||{};
  const s8=r.sec_8_wealth||{},s10=r.sec_10_career||{},s11=r.sec_11_education||{};
  const s12=r.sec_12_marriage||{},s13=r.sec_13_children||{},s14=r.sec_14_health||{};
  const s17=r.sec_17_da_yun_detail||{},s18=r.sec_18_verdicts||[],s20=r.sec_20_wu_xing_advice||{};
  const a=data.analysis||{};
  const pi=bd.pillars||{},ri=bd.ri_zhu||{};
  const bazi=pp.bazi||s1.bazi||'';

  const hourNames=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  const hourLabel=hourNames[Math.floor(hour/2)]||'子';

  let html='';

  /* ── ① 个人档案 ── */
  html+=`<div class="profile-header">
    <div class="name">${name}</div>
    <div class="big-bazi">${bazi}</div>
    <div class="info">
      <span>${gender}</span>·
      <span>${year}年${month}月${day}日</span>·
      <span>${hourLabel}时</span>·
      <span>日主${ri.gan||s1.ri_zhu?.gan||''}(${ri.wu_xing||s1.ri_zhu?.wx||''})</span>
    </div>
  </div>`;

  /* ── ② 四柱信息表 ── */
  const pNames=['year','month','day','hour'];
  const pLabels=['年柱','月柱','日柱','时柱'];
  html+=`<div class="card"><div class="card-title">📋 四柱信息</div>
  <table class="pillar-table"><tr><th></th>${pLabels.map(l=>'<th>'+l+'</th>').join('')}</tr>`;
  const rows=[
    ['十神',p=>pi[p]?.shi_shen||''],
    ['天干',p=>pi[p]?.tian_gan||''],
    ['地支',p=>pi[p]?.di_zhi||''],
    ['纳音',p=>pi[p]?.na_yin||''],
    ['空亡',p=>pi[p]?.kong_wang||''],
  ];
  rows.forEach(([l,fn])=>{
    html+=`<tr><td class="label-cell">${l}</td>${pNames.map(p=>'<td>'+fn(p)+'</td>').join('')}</tr>`;
  });
  html+=`</table></div>`;

  /* ── ③ 核心指标 ── */
  const sqrLabel=s3.label||a.shen_qiang_ruo?.label||'';
  const sqrScore=s3.score||a.shen_qiang_ruo?.score||0;
  const caiTotal=s8.cai_xing_total||a.cai_xing?.total||0;
  const geDetail=r.sec_2_ge_ju?.detail||a.ge_ju?.detail||'';
  const xiArr=s4.xi||a.xi_yong_shen?.xi||[];
  const jiArr=s4.ji||a.xi_yong_shen?.ji||[];
  html+=`<div class="card"><div class="card-title">⚖️ 核心数据</div>
  <div class="metrics">
    <div class="metric"><div class="lbl">身强弱</div><div class="val">${sqrLabel}${sqrScore}分</div></div>
    <div class="metric"><div class="lbl">财星</div><div class="val">${caiTotal}分</div></div>
    <div class="metric"><div class="lbl">格局</div><div class="val" style="font-size:14px">${geDetail||'—'}</div></div>
  </div>
  <div style="display:flex;gap:16px;margin-top:8px;font-size:13px">
    <span>喜用: <strong style="color:var(--g)">${xiArr.join('、')||'—'}</strong></span>
    <span>忌神: <strong style="color:#c0392b">${jiArr.join('、')||'—'}</strong></span>
  </div></div>`;

  /* ── ④ 报告正文 ── */
  html+=`<div class="card"><div class="card-title">📜 命理分析</div><div class="report-body">`;

  // 身强弱
  const riGan=ri.gan||s1.ri_zhu?.gan||'';
  const riWx=ri.wu_xing||s1.ri_zhu?.wx||'';
  const natureMap={甲:['正直担当','参天大树'],乙:['柔韧灵活','藤萝花草'],丙:['热情开朗','太阳之火'],丁:['温文尔雅','灯烛之火'],戊:['稳重诚信','泰山之土'],己:['包容柔和','田园之土'],庚:['刚毅果断','刀剑之金'],辛:['精致优雅','珠玉之金'],壬:['智慧灵动','江河之水'],癸:['含蓄深沉','雨露之水']};
  const nat=natureMap[riGan]||['',''];
  html+=`<h3>一、一页总览</h3>`;
  html+=`<p>八字<b>${bazi}</b>，日主<b>${riGan}${riWx?'('+riWx+')':''}</b>。</p>`;
  if(nat[0])html+=`<p>日主${riGan}${riWx}，性格${nat[0]}，犹如${nat[1]}。</p>`;
  if(sqrLabel=='从弱')html+=`<p>格局为从弱格（${sqrScore}分），全局能量高度集中，非常人能驾驭。</p>`;
  else if(sqrLabel=='身强'&&sqrScore>=70)html+=`<p>身强偏旺（${sqrScore}分），体质强健，能扛压力，有担当大事的底子。</p>`;
  else if(sqrLabel=='身强')html+=`<p>身强（${sqrScore}分），根基扎实，有一定的抗压能力和事业基础。</p>`;
  else html+=`<p>${sqrLabel}（${sqrScore}分），宜借平台和贵人发力，不宜单打独斗。</p>`;
  if(geDetail)html+=`<p>格局${geDetail}。</p>`;
  const geDescMap={正官格:'命带正官，为人正直守信，有管理才能',七杀格:'命带七杀，魄力非凡，有闯劲',正财格:'命带正财，求财踏实稳重',偏财格:'命带偏财，财路宽广灵活',正印格:'命带正印，学识渊博，有贵人运',偏印格:'命带偏印，思维独特，有冷门专长',食神格:'命带食神，心态好福气厚',伤官格:'命带伤官，才华横溢有灵气'};
  const geKey=geDetail?.split('格')[0]+'格';
  if(geDescMap[geKey])html+=`<p>${geDescMap[geKey]}。</p>`;

  // 财富
  const wealthLevel=s8.wealth_level||'';
  const levelDesc={巨富:'亿万级别',大富:'数亿级别',中富:'千万级别',小富:'小康以上'};
  const kuInfo='';
  const ck=s8.cai_ku||{};
  html+=`<h3>二、财富格局</h3>`;
  html+=`<p>财星<b>${caiTotal}分</b>，属<b>${wealthLevel}</b>层次。${levelDesc[wealthLevel]||''}。</p>`;
  if(ck.has)html+=`<p>命带财库（${(ck.zhi||[]).join('、')}），有储存和积累财富的能力。</p>`;

  // 事业
  const careerDir=s10.career_direction||'',careerGrade=s10.career_grade||'',industry=s10.recommended_industries||'',ent=s10.entrepreneurship||'',bestPath=s10.best_path||'';
  html+=`<h3>三、事业发展</h3>`;
  if(careerDir)html+=`<p>事业方向宜走<b>${careerDir}</b>路线。</p>`;
  if(careerGrade)html+=`<p>${careerGrade}。</p>`;
  if(industry)html+=`<p>五行定行业，适宜从事${industry}等相关领域。</p>`;
  if(ent)html+=`<p>${ent}</p>`;
  if(bestPath)html+=`<p>${bestPath}</p>`;

  // 学历
  const eduDisplay=s11.display||s11.school_level||'';
  const ypc=s11.year_pillar_check||{};
  const nc=s11.nian_gan_check||{};
  html+=`<h3>四、学业学历</h3>`;
  if(eduDisplay)html+=`<p>学业层次：${eduDisplay}</p>`;
  if(ypc.detail)html+=`<p>年柱分析：${ypc.detail}</p>`;
  if(nc.shi_shen=='伤官')html+=`<p>年干带伤官，少年时期或有叛逆倾向。</p>`;
  else if(nc.shi_shen=='正印'||nc.shi_shen=='偏印')html+=`<p>年干见印星，有学业基因。</p>`;

  // 婚姻
  const marQ=s12.quality||'',marScore=s12.quality_score||'',marWin=s12.best_window_age||'',spouse=s12.spouse_trait||'';
  html+=`<h3>五、婚姻感情</h3>`;
  if(marQ)html+=`<p>婚姻质量<b>${marQ}</b>${marScore?'（'+marScore+'/10）':''}。</p>`;
  if(marWin)html+=`<p>最佳婚恋窗口在<b>${marWin}</b>。</p>`;
  if(spouse)html+=`<p>配偶特征：${spouse}。</p>`;

  // 子女
  const childCount=s13.child_count_estimate||'',childAch=s13.child_achievement||'',shengYu=s13.sheng_yu_potential||'';
  html+=`<h3>六、子女运势</h3>`;
  if(childCount)html+=`<p>子女方面，约${typeof childCount=='object'?childCount.text||childCount.数量||'':childCount}。</p>`;
  if(childAch)html+=`<p>子女成就趋势：${childAch}。</p>`;
  if(shengYu)html+=`<p>${typeof shengYu=='object'?shengYu.desc||shengYu.text||'':shengYu}</p>`;

  // 健康
  const constit=s14.constitution||'',wxot=s14.wu_xing_over_three||[],battles=s14.wu_xing_battles||[];
  html+=`<h3>七、健康注意</h3>`;
  if(constit)html+=`<p>体质方面：${constit}。</p>`;
  if(wxot.length){wxot.slice(0,2).forEach(item=>{if(item.wx&&item.organ)html+=`<p>注意<b>${item.wx}</b>五行过旺，对应<b>${item.organ}</b>需留意保养。</p>`;});}
  if(battles.length){battles.slice(0,2).forEach(b=>{if(b.disease)html+=`<p>地支冲克提示：${b.disease}。</p>`;});}

  html+=`</div></div>`;

  /* ── ⑤ 大运走势 ── */
  const dyList=s17.list||a.da_yun?.list||[];
  if(dyList.length){
    html+=`<div class="card"><div class="card-title">🚀 大运走势</div><div class="dy-grid">`;
    dyList.forEach(dy=>{
      const sc=dy.score||5;
      let cls='dy-item';
      if(sc>=8)cls+=' gold';else if(sc>=6)cls+=' green';else if(sc>=4)cls+=' yellow';else cls+=' red';
      html+=`<div class="${cls}"><div class="dy-name">${dy.gan_zhi}</div><div class="dy-age">${dy.start_age}~${dy.end_age}岁</div><div style="font-size:10px;color:var(--m)">${sc}分</div></div>`;
    });
    html+=`</div></div>`;
  }

  /* ── ⑥ 三决断 ── */
  if(s18.length){
    html+=`<div class="card"><div class="card-title">🎯 三决断</div><div class="verdicts">`;
    s18.forEach(v=>{
      html+=`<div class="verdict-item"><div class="vt">${v.title||''}</div><div class="ve">${v.event||''}</div></div>`;
    });
    html+=`</div></div>`;
  }

  /* ── ⑦ 八维评分 ── */
  const dims=a.dimensions||{};
  if(Object.keys(dims).length){
    html+=`<div class="card"><div class="card-title">📊 八维评分</div><div class="dim-list">`;
    Object.entries(dims).forEach(([k,v])=>{
      const t=v.total||0,pct=t*10,c=t>=7?'#4caf50':t>=5?'#c9a84c':'#c0392b';
      html+=`<div class="dim-row"><div class="dn">${k}</div><div class="db"><div class="df" style="width:${pct}%;background:${c}"></div></div><div class="ds">${t}</div></div>`;
    });
    html+=`</div></div>`;
  }

  /* ── ⑧ 五行开运 ── */
  if(s20.colors||s20.directions||s20.jewellery||s20.diet){
    html+=`<div class="card"><div class="card-title">🌈 五行开运</div><div class="wx-grid">`;
    if(s20.colors)html+=`<div class="wx-item"><div class="wl">🎨颜色</div>${s20.colors}</div>`;
    if(s20.directions)html+=`<div class="wx-item"><div class="wl">🧭方位</div>${s20.directions}</div>`;
    if(s20.jewellery)html+=`<div class="wx-item"><div class="wl">💎饰品</div>${s20.jewellery}</div>`;
    if(s20.diet)html+=`<div class="wx-item"><div class="wl">🥗饮食</div>${s20.diet}</div>`;
    html+=`</div></div>`;
  }

  /* ── 页脚 ── */
  html+=`<div style="text-align:center;padding:16px 0;font-size:11px;color:var(--m);line-height:1.6">
    金鉴真人 · 八字命理分析<br>确定性规则引擎 v5.0 · 21§完整输出</div>`;

  $('report').innerHTML=html;
}
</script>
</body>
</html>
