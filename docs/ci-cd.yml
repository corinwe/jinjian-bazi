# ── 金鉴真人·八字命理平台 CI/CD 流水线 ──
# Phase 1: 验证 → Phase 2: 构建 → Phase 3: 部署

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ═══════════════════════════════════════════════
  # Phase 1: 验证 (计算型验证优先)
  # ═══════════════════════════════════════════════
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r api/requirements.txt

      - name: ① 引擎模块导入验证
        run: |
          cd engine && python3 tests/test_imports.py

      - name: ② 引擎全量测试 (320条)
        run: |
          cd engine && python3 tests/test_full_suite.py

      - name: ③ 排盘正确性验证
        run: |
          cd engine && python3 -c "
          import sys; sys.path.insert(0, '.')
          from paipan import paipan
          from shen_qiang_ruo import compute_shen_qiang_ruo
          # 验证子源八字
          bazi = paipan(2011, 4, 25, 10, '男')
          assert bazi.bazi == '辛卯 壬辰 庚戌 辛巳', f'排盘错误: {bazi.bazi}'
          print(f'✅ 排盘验证通过: {bazi.bazi}')
          "

      - name: ④ 全量验证
        run: |
          cd engine && python3 tests/validate_all.py

  # ═══════════════════════════════════════════════
  # Phase 2: 构建 (Docker镜像)
  # ═══════════════════════════════════════════════
  build:
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: jinjian-bazi:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run --rm -d -p 8000:8000 --name bazi-test jinjian-bazi:latest
          sleep 3
          curl -s http://localhost:8000/ping | grep -q '"status":"ok"'
          echo "✅ Docker健康检查通过"
          curl -s http://localhost:8000/health | grep -q '"status":"healthy"'
          echo "✅ Docker引擎状态通过"
          docker stop bazi-test

  # ═══════════════════════════════════════════════
  # Phase 3: 部署 (自动部署到服务器)
  # ═══════════════════════════════════════════════
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /root/bazi-platform
            git pull origin main
            pip install -r api/requirements.txt
            cd engine && python3 tests/test_imports.py && python3 tests/test_full_suite.py && python3 tests/validate_all.py
            cd ..
            pkill -f "uvicorn api.main" || true
            sleep 1
            nohup python3 -m uvicorn api.main:app --host 0.0.0.0 --port 8000 --log-level warning > /tmp/bazi-api.log 2>&1 &
            sleep 2
            curl -s http://localhost:8000/health | grep -q '"status":"healthy"'
            echo "✅ 部署完成"
